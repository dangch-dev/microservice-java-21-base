spring:
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: jdbc:mysql://dangch-mysql:3306/notification_mysql_database?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: mysql_root_password
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.MySQL8Dialect
    open-in-view: false
  kafka:
    bootstrap-servers: dangch-kafka:9092
    consumer:
      group-id: notification-service
      auto-offset-reset: latest

server:
  port: 8083
  forward-headers-strategy: framework

security:
  external-jwt:
    public-key-path: file:../secrets/jwt-public.pem

notification:
  kafka:
    group: notification-service

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://dangch-eureka:8761/eureka
  instance:
    prefer-ip-address: true
    hostname: dangch-notification
    instance-id: ${spring.application.name}:${server.port}

sendgrid:
  api-key:
  from: no-reply@simes.io.vn

logging:
  level:
    org.springframework.security: INFO

# Required declarations (But it doesn't need to have value.)
internal:
  config:
    token-path: /oauth/token
    client-id: 1YdPn9oQ6GktbMOy6fENEU59
    client-secret: ZugYznmLAWbGIJvmf0ikH2ymy9p4MdN0
  service:
    auth-service: repo-auth

kafka:
  topics:
    notification: notification.in-app
    file: storage.file
    mail: notification.mail
